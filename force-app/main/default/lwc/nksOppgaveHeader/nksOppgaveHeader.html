<template>
    <div class="slds-var-m-bottom_small slds-var-m-top_small">
        <lightning-spinner lwc:if={isLoading} variant="brand" size="small"></lightning-spinner>
        <div class="header-row slds-var-p-horizontal_small">
            <div class="header-title-col">
                <div class="slds-media slds-media_center">
                    <div class="slds-media__figure">
                        <span class="slds-icon_container">
                            <lightning-icon icon-name="custom:custom45" size="medium"></lightning-icon>
                        </span>
                    </div>
                    <div class="slds-media__body">
                        <div class="slds-page-header__name-title slds-grid slds-grid_vertical-align-center slds-wrap">
                            <h1 class="slds-m-right_xx-large slds-truncate">
                                <span class="header-title">Oppgave</span>
                            </h1>
                            <div lwc:if={status} class="slds-m-right_xx-large">
                                <div class="slds-text-title slds-p-bottom_xx-small">Status</div>
                                <span class={statusClass}>{statusLabel}</span>
                            </div>
                            <div lwc:if={personName} class="slds-m-right_xx-large">
                                <div class="slds-text-title slds-p-bottom_xx-small">Navn</div>
                                <a lwc:if={personAccountId} onclick={navigateToPersonAccount} class="person-name-link"
                                    >{personName}</a
                                >
                                <span lwc:else>{personName}</span>
                            </div>
                            <div lwc:if={formattedDateOfBirth} class="slds-m-right_xx-large">
                                <div class="slds-text-title slds-p-bottom_xx-small">Fødselsdato</div>
                                <div class="person-number-row">
                                    <span>{formattedDateOfBirth}</span>
                                    <lightning-button-icon
                                        value={formattedDateOfBirth}
                                        icon-name="utility:copy"
                                        variant="bare"
                                        onclick={handleCopy}
                                        alternative-text="Kopier fødselsdato"
                                        title="Kopier fødselsdato"
                                        class="copy-icon"
                                    ></lightning-button-icon>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-actions-col">
                <template lwc:if={errorText}>
                    <div class="error-message-box slds-m-right_small">
                        <lightning-icon
                            icon-name="utility:warning"
                            variant="error"
                            size="x-small"
                            class="warning-icon"
                        ></lightning-icon>
                        <strong class="error-text">{errorText}</strong>
                    </div>
                </template>
                <div class="slds-no-flex">
                    <lightning-button
                        label="Ferdigstill oppgave"
                        variant="neutral"
                        onclick={handleFinishOppgave}
                        disabled={isButtonDisabled}
                    ></lightning-button>
                </div>
            </div>
        </div>
    </div>
</template>
