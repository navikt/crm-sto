<template>
    <div class="oppgave-detail-page">
        <div lwc:if={oppgave} class="slds-box slds-theme_default slds-var-m-bottom_small">
            <c-nks-oppgave-header
                status={oppgave.status}
                is-loading={isLoading}
                is-saving={isSaving}
                error-message={headerErrorMessage}
                onfinishoppgave={handleFinishOppgave}
            ></c-nks-oppgave-header>
        </div>
        <lightning-spinner lwc:if={isLoading} variant="brand" size="small"></lightning-spinner>

        <div lwc:if={oppgave} class="slds-box slds-theme_default slds-var-m-bottom_small">
            <c-nks-oppgave-detail-form
                oppgave={oppgave}
                onsave={handleSave}
                is-saving={isSaving}
                error-message={formErrorMessage}
            ></c-nks-oppgave-detail-form>
        </div>

        <div lwc:if={oppgave} class="bottom-sections">
            <div lwc:if={hasExternalReference} class="bottom-section slds-box slds-theme_default">
                <c-nks-dialogue-viewer
                    external-api-reference={oppgave.utvidelser.henvendelseId}
                ></c-nks-dialogue-viewer>
            </div>
            <div class="bottom-section slds-box slds-theme_default">
                <c-nks-oppgave-comments kommentarer={oppgave.kommentarer}></c-nks-oppgave-comments>
            </div>
        </div>
    </div>
</template>
