<template>
    <section class="slds-box slds-theme_default slds-is-relative">
        <lightning-spinner lwc:if={isLoading} variant="brand" size="small"></lightning-spinner>
        <lightning-layout class="slds-var-p-bottom_small">
            <lightning-layout-item class="slds-media__figure">
                <lightning-icon icon-name="custom:custom45" size="small" aria-hidden="true"></lightning-icon>
            </lightning-layout-item>
            <lightning-layout-item>
                <h2 class="slds-text-heading_medium slds-truncate">Mine oppgaver på personbruker</h2>
            </lightning-layout-item>
            <lightning-layout-item class="slds-col">
                <lightning-button-icon
                    class="slds-float_right"
                    icon-name="utility:refresh"
                    title="Oppdater"
                    onclick={handleRefresh}
                    disabled={isRefreshDisabled}
                ></lightning-button-icon>
            </lightning-layout-item>
        </lightning-layout>
        <c-crm-empty-state-no-task lwc:if={emptyState} message="Ingen oppgaver"></c-crm-empty-state-no-task>
        <div lwc:if={hasOppgaver}>
            <lightning-layout class="column-headers">
                <lightning-layout-item size="2">
                    <span class="slds-text-title_bold">Frist</span>
                </lightning-layout-item>
                <lightning-layout-item size="5">
                    <span class="slds-text-title_bold slds-p-left_small">Tema</span>
                </lightning-layout-item>
                <lightning-layout-item size="4">
                    <span class="slds-text-title_bold">Oppgavetype</span>
                </lightning-layout-item>
            </lightning-layout>
            <template for:each={oppgaverWithPersonData} for:item="oppgave">
                <c-nks-oppgave-expandable-panel key={oppgave.id}>
                    <lightning-layout slot="header">
                        <lightning-layout-item size="2">{oppgave.fristFormatted}</lightning-layout-item>
                        <lightning-layout-item class="slds-p-left_medium" size="5"
                            >{oppgave.tema}</lightning-layout-item
                        >
                        <lightning-layout-item class="slds-p-left_x-small" size="4"
                            >{oppgave.oppgavetype}</lightning-layout-item
                        >
                    </lightning-layout>
                    <div class="oppgave-body">
                        <p
                            lwc:if={oppgave.personNameAndAge}
                            class="slds-text-body_regular slds-text-title_bold slds-var-m-bottom_x-small"
                        >
                            {oppgave.personNameAndAge}
                        </p>
                        <p lwc:if={oppgave.beskrivelse} class="slds-text-body_regular slds-var-m-bottom_small">
                            {oppgave.beskrivelse}
                        </p>
                        <lightning-button
                            label="Behandle oppgave"
                            variant="brand"
                            data-id={oppgave.id}
                            data-oppgavetype={oppgave.oppgavetype}
                            onclick={handleNavigateToOppgave}
                        ></lightning-button>
                    </div>
                </c-nks-oppgave-expandable-panel>
            </template>
        </div>
        <div class="slds-var-p-top_small">
            <a onclick={navigateToOppgaveTable}>Se alle oppgaver</a>
        </div>
    </section>
</template>
